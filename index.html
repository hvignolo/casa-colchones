                    users[username] = { username, password, businessName, registeredAt: new Date().toISOString() };

                    const newUser = users[username];
                    setCurrentUser(newUser);
                    localStorage.setItem("currentUser", JSON.stringify(newUser));
                    setShowLogin(false);
                    return true;
                } else {
                    const user = users[username];
                    if (user && user.password === password) {
                        setCurrentUser(user);
                        localStorage.setItem("currentUser", JSON.stringify(user));
                        setShowLogin(false);
                        return true;
                    }
                    return false;
                }
            };

                let filtered = products;
                if (activeFilter !== "TODOS") {
                    filtered = filtered.filter(product => product.tipo === activeFilter);
                }
                if (searchQuery.trim()) {
                    filtered = filtered.filter(product =>
                        product.nombre.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        product.codigo.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        product.marca.toLowerCase().includes(searchQuery.toLowerCase())

*${product.nombre}*

• Marca: ${product.marca}
• Medidas: ${product.medidas}
• Tipo: ${product.tipo} - ${product.subtipo}

• Contado: $${product.precioContado.toLocaleString()}
• Tarjeta: $${product.precioTarjeta.toLocaleString()}
• Ahorrás: $${(product.precioTarjeta - product.precioContado).toLocaleString()} pagando de contado

*Descripción:*
${product.detalles}

${product.image ? `*Imagen:* ${product.image}` : ''}

*Contacto:*
• Ubicación: ${storeData.location}
• Teléfono: ${storeData.phone}
• Horarios: ${storeData.hours}`;

                    e.preventDefault();
                    if (!formData.username || !formData.password || (loginMode === "register" && !formData.businessName)) {
                        setLoginError("Todos los campos son requeridos");
                        return;
                    }
                    const success = handleLogin(formData.username, formData.password, formData.businessName);
                    if (!success) {
                        setLoginError(loginMode === "login" ? "Usuario o contraseña incorrectos" : "El usuario ya existe");
                    }
                };

                return React.createElement("div", { className: "min-h-screen bg-gray-100 flex items-center justify-center p-4" },
                    React.createElement("div", { className: "bg-white rounded-lg shadow-lg p-8 max-w-md w-full" },

                                                React.createElement("path", { d: "M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893A11.821 11.821 0 0020.885 3.488" })
                                            ),

                                React.createElement(IconComponent, { className: "w-4 h-4" }),
                                React.createElement("span", { className: "text-sm font-medium" }, chip.label)
                            );
                        })
                    )
                ),

                // Products
                React.createElement("main", { className: "p-4" },
                    filteredProducts.length === 0 ? 
                        React.createElement("div", { className: "text-center py-12" },
                            React.createElement("div", { className: "text-gray-400 mb-4" },
                                React.createElement(Search, { className: "w-12 h-12 mx-auto" })
                            ),
                            React.createElement("p", { className: "text-gray-500 text-lg" }, "No se encontraron productos")
                        ) :
                        React.createElement("div", { className: "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" },
                            filteredProducts.map(product =>
                                React.createElement("div", {
                                    key: product.id,
                                    className: "bg-white rounded-2xl shadow-sm p-4 hover:shadow-md transition-shadow cursor-pointer",
                                    onClick: () => setSelectedProduct(product)
                                },
                                    product.image && React.createElement("img", {
                                        src: product.image, alt: product.nombre,
                                        className: "w-full h-40 object-cover rounded-lg mb-3"
                                    }),
                                    React.createElement("div", { className: "space-y-2" },
                                        React.createElement("h3", { className: "font-semibold text-gray-900 text-sm" }, product.nombre),
                                        React.createElement("p", { className: "text-xs text-gray-500" }, `${product.codigo} • ${product.marca}`),
                                        React.createElement("p", { className: "text-xs text-gray-600" }, product.medidas),
                                        React.createElement("div", { className: "flex justify-between items-end" },
                                            React.createElement("div", null,
                                                React.createElement("p", { className: "text-green-600 font-bold text-sm" }, "$", product.precioContado.toLocaleString()),
                                                React.createElement("p", { className: "text-blue-600 text-xs" }, "$", product.precioTarjeta.toLocaleString())
                                            ),
                                            React.createElement("span", { className: "bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs font-medium" }, product.tipo)
                                        )
                                    )
                                )
                            )
                        )
                ),

                // Modal de producto
                React.createElement(ProductModal, { product: selectedProduct, onClose: () => setSelectedProduct(null) })
            );
        };

        // Renderizar
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
